<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">Add a New Movie</h1>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        {% if error != "" %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        {% if success != "" %}
                        <div class="alert alert-success">{{ success }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" id="title" name="title" class="form-control" maxlength="100" required value="{{ form_data.title }}">
                            </div>

                            <div class="mb-3">
                                <label for="genre" class="form-label">Genre</label>
                                <input type="text" id="genre" name="genre" class="form-control" maxlength="50" required value="{{ form_data.genre }}">
                            </div>

                            <div class="mb-3">
                                <label for="director" class="form-label">Director</label>
                                <input type="text" id="director" name="director" class="form-control" maxlength="100" required value="{{ form_data.director }}">
                            </div>

                            <div class="mb-3">
                                <label for="year" class="form-label">Year</label>
                                <input type="number" id="year" name="year" class="form-control" min="1888" max="2100" required value="{{ form_data.year }}">
                            </div>

                            <button type="submit" class="btn btn-success">Submit</button>
                            <a href="/home" class="btn btn-secondary">Back</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
